<svg width="100%" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFF7E8"/>
    <stop offset="100%" stop-color="#FDE8FF"/>
  </linearGradient>
  <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFE07A"/>
    <stop offset="100%" stop-color="#FF7A18"/>
  </linearGradient>
  <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FF8AAE"/>
    <stop offset="100%" stop-color="#C026D3"/>
  </linearGradient>
  <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#C084FC"/>
    <stop offset="100%" stop-color="#7C3AED"/>
  </linearGradient>
  <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#7DD3FC"/>
    <stop offset="100%" stop-color="#2563EB"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#2A163A" flood-opacity="0.12"/>
  </filter>
  <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#FFD36A" flood-opacity="0.18"/>
    <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2A163A" flood-opacity="0.10"/>
  </filter>
  <style>
    text { font-family: "Noto Serif", Georgia, "Times New Roman", serif; }
    .title { font-size: 24px; font-weight: 800; fill: #2A163A; }
    .subtitle { font-size: 13px; font-weight: 500; fill: #7A5E7E; }
    .label { font-size: 13px; font-weight: 700; fill: #2A163A; }
    .small { font-size: 11px; font-weight: 500; fill: #7A5E7E; }
    .tiny { font-size: 10px; font-weight: 600; fill: #7A5E7E; }
    .num { font-size: 13px; font-weight: 800; fill: #2A163A; }
  </style>
</defs>
<rect x="0" y="0" width="100%" height="100%" fill="url(#bgGrad)"/><circle cx="780" cy="60" r="110" fill="#FFFFFF" opacity="0.18"/><circle cx="120" cy="440" r="140" fill="#FFD36A" opacity="0.08"/>
<text class="title" x="450.0" y="34" text-anchor="middle">Death and the name in the same characters</text>
<text class="subtitle" x="450.0" y="55" text-anchor="middle">The same sequence yields ram forward and mar in reversal.</text>
<g transform="translate(125,100)">
<g filter="url(#softShadow)"><rect x="0" y="0" width="68" height="56" rx="16" fill="url(#roseGrad)" opacity="0.9"/><text class="title" x="34" y="31" text-anchor="middle" font-size="22" dominant-baseline="central">r</text></g>
<g filter="url(#softShadow)"><rect x="78" y="0" width="68" height="56" rx="16" fill="url(#roseGrad)" opacity="0.9"/><text class="title" x="112" y="31" text-anchor="middle" font-size="22" dominant-baseline="central">ā</text></g>
<g filter="url(#softShadow)"><rect x="156" y="0" width="68" height="56" rx="16" fill="url(#roseGrad)" opacity="0.9"/><text class="title" x="190" y="31" text-anchor="middle" font-size="22" dominant-baseline="central">m</text></g>
<g filter="url(#softShadow)"><rect x="234" y="0" width="68" height="56" rx="16" fill="url(#roseGrad)" opacity="0.9"/><text class="title" x="268" y="31" text-anchor="middle" font-size="22" dominant-baseline="central">a</text></g>
<g filter="url(#softShadow)"><rect x="312" y="0" width="68" height="56" rx="16" fill="url(#roseGrad)" opacity="0.9"/><text class="title" x="346" y="31" text-anchor="middle" font-size="22" dominant-baseline="central">r</text></g>
<g filter="url(#softShadow)"><rect x="390" y="0" width="68" height="56" rx="16" fill="url(#roseGrad)" opacity="0.9"/><text class="title" x="424" y="31" text-anchor="middle" font-size="22" dominant-baseline="central">ā</text></g>
<g filter="url(#softShadow)"><rect x="468" y="0" width="68" height="56" rx="16" fill="url(#roseGrad)" opacity="0.9"/><text class="title" x="502" y="31" text-anchor="middle" font-size="22" dominant-baseline="central">m</text></g>
<g filter="url(#softShadow)"><rect x="546" y="0" width="68" height="56" rx="16" fill="url(#roseGrad)" opacity="0.9"/><text class="title" x="580" y="31" text-anchor="middle" font-size="22" dominant-baseline="central">e</text></g>
<path d="M95 110 C220 60, 360 60, 485 110" fill="none" stroke="url(#goldGrad)" stroke-width="5" opacity="0.8"/>
<path d="M485 164 C360 214, 220 214, 95 164" fill="none" stroke="url(#violetGrad)" stroke-width="5" opacity="0.8"/>
<g filter="url(#softShadow)"><rect x="20" y="94" width="190" height="40" rx="20" fill="url(#goldGrad)" opacity="0.95"/><text class="label" x="115" y="119" text-anchor="middle">ram (√ram: delight)</text></g>
<g filter="url(#softShadow)"><rect x="370" y="140" width="190" height="40" rx="20" fill="url(#violetGrad)" opacity="0.95"/><text class="label" x="465" y="165" text-anchor="middle" fill="white">mar (death)</text></g>
</g>
<g transform="translate(250,305)"><rect x="0" y="-4" width="400" height="34" rx="17" fill="url(#tealGrad)" opacity="0.20"/><text class="small" x="200" y="18" text-anchor="middle">Reversal in sound becomes negation in theology: a-mṛta, the deathless.</text></g>
</svg>