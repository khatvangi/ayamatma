<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genetic Code Optimality — The Beakers</title>
  <style>
    body { margin: 0; background: #0a0a0f; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #sketch-container { position: relative; cursor: pointer; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
</head>
<body>
  <div id="sketch-container"></div>
  <script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
var CT={AAA:"K",AAC:"N",AAG:"K",AAU:"N",ACA:"T",ACC:"T",ACG:"T",ACU:"T",AGA:"R",AGC:"S",AGG:"R",AGU:"S",AUA:"I",AUC:"I",AUG:"M",AUU:"I",CAA:"Q",CAC:"H",CAG:"Q",CAU:"H",CCA:"P",CCC:"P",CCG:"P",CCU:"P",CGA:"R",CGC:"R",CGG:"R",CGU:"R",CUA:"L",CUC:"L",CUG:"L",CUU:"L",GAA:"E",GAC:"D",GAG:"E",GAU:"D",GCA:"A",GCC:"A",GCG:"A",GCU:"A",GGA:"G",GGC:"G",GGG:"G",GGU:"G",GUA:"V",GUC:"V",GUG:"V",GUU:"V",UAC:"Y",UAU:"Y",UCA:"S",UCC:"S",UCG:"S",UCU:"S",UGC:"C",UGG:"W",UGU:"C",UUA:"L",UUC:"F",UUG:"L",UUU:"F"};
var SC=Object.keys(CT),BA=["A","U","G","C"],GB=["U","C","A","G"];

var PCA={A:[-0.64,-2.89,-0.40,-1.25,1.34,-0.49,-1.61,0.16],C:[0.10,-1.72,1.28,0.14,-1.87,-0.39,-0.31,0.79],D:[2.81,-1.02,-2.58,1.69,-0.62,0.01,0.46,-0.80],E:[2.03,0.34,-4.45,0.75,0.12,0.07,-0.51,-0.44],F:[-3.98,0.25,0.12,0.98,0.76,0.61,-0.20,-0.17],G:[3.36,-3.85,1.62,-0.75,1.14,2.66,0.34,0.08],H:[0.83,1.95,0.46,1.55,1.00,0.59,-0.96,-0.05],I:[-3.83,-1.02,-0.34,-1.70,-0.36,0.06,0.58,-0.47],K:[2.10,3.64,0.26,-2.08,0.64,-0.47,-0.17,-0.12],L:[-3.45,-0.98,-0.55,-1.48,0.00,-0.42,0.35,-0.24],M:[-1.61,0.07,-1.44,-0.83,-0.21,-0.30,-0.14,1.94],N:[2.83,-0.33,0.28,0.72,0.09,-0.14,1.48,0.36],P:[0.92,-2.20,2.06,2.08,1.53,-2.60,0.41,-0.29],Q:[1.52,0.88,-1.04,-0.14,0.32,0.00,1.12,0.91],R:[2.28,4.99,1.30,-2.40,0.37,-0.14,0.09,-0.39],S:[3.02,-1.01,1.06,0.02,-1.27,-0.08,-1.10,-0.10],T:[1.46,0.02,0.63,-0.22,-1.85,-0.44,-0.27,-0.28],V:[-3.63,-1.63,-0.07,-1.71,-0.36,0.04,0.49,-0.90],W:[-4.26,2.63,0.26,2.55,0.57,0.61,-0.01,0.30],Y:[-1.87,1.86,1.53,2.08,-1.35,0.82,-0.05,-0.27]};

var ACOL={A:[230,120,60],V:[210,90,50],L:[220,100,55],I:[200,80,45],M:[190,70,40],F:[180,60,35],W:[170,50,30],S:[70,160,200],T:[80,170,210],N:[60,150,190],Q:[90,180,220],Y:[100,140,180],C:[50,130,170],K:[150,80,180],R:[130,60,160],H:[170,100,200],D:[80,180,80],E:[100,200,100],G:[140,140,140],P:[140,100,70]};

// RAA10 reduced alphabet
var RAA10={A:"X1",G:"X1",V:"X2",L:"X2",I:"X2",M:"X2",F:"X3",W:"X3",Y:"X3",S:"X4",T:"X4",N:"X5",Q:"X5",D:"X6",E:"X6",K:"X7",R:"X7",H:"X8",P:"X9",C:"X10"};
var RAA_NAMES={X1:"Tiny",X2:"Aliphatic",X3:"Aromatic",X4:"Hydroxyl",X5:"Amide",X6:"Acidic",X7:"Basic",X8:"His",X9:"Pro",X10:"Cys"};
// class centroids
var CC={};
(function(){var s={},n={};for(var aa in RAA10){var c=RAA10[aa];if(!s[c]){s[c]=[0,0,0,0,0,0,0,0];n[c]=0;}var v=PCA[aa];for(var i=0;i<8;i++)s[c][i]+=v[i];n[c]++;}for(var c in s)CC[c]=s[c].map(function(x){return x/n[c];});})();
// class colors (average of member AA colors)
var CCOL={};
(function(){var m={};for(var aa in RAA10){var c=RAA10[aa];if(!m[c])m[c]=[];m[c].push(ACOL[aa]);}for(var c in m){var a=[0,0,0];for(var i=0;i<m[c].length;i++){a[0]+=m[c][i][0];a[1]+=m[c][i][1];a[2]+=m[c][i][2];}CCOL[c]=[Math.round(a[0]/m[c].length),Math.round(a[1]/m[c].length),Math.round(a[2]/m[c].length)];}})();

// doublet table: majority vote over 3rd base
var DT={},DC=[];
(function(){for(var i=0;i<4;i++)for(var j=0;j<4;j++){var db=BA[i]+BA[j],cc={};for(var k=0;k<4;k++){var cod=db+BA[k],aa=CT[cod];if(aa){var cl=RAA10[aa];cc[cl]=(cc[cl]||0)+1;}}var best=null,bc=0,sk=Object.keys(cc).sort();for(var si=0;si<sk.length;si++)if(cc[sk[si]]>bc){best=sk[si];bc=cc[sk[si]];}if(best)DT[db]=best;}DC=Object.keys(DT);})();

// triplet → RAA10 assignment
var RA={};for(var k in CT)RA[k]=RAA10[CT[k]];

// ═══════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════
function l2(a,b){var s=0;for(var i=0;i<a.length;i++){var d=a[i]-b[i];s+=d*d;}return Math.sqrt(s);}
function neighbors(c){var n=[];for(var i=0;i<c.length;i++)for(var j=0;j<4;j++)if(BA[j]!==c[i])n.push(c.slice(0,i)+BA[j]+c.slice(i+1));return n;}
function computeD(codons,asgn,vecs){var t=0,c=0;for(var i=0;i<codons.length;i++){var cd=codons[i],lb=asgn[cd];if(!lb||!vecs[lb])continue;var vc=vecs[lb],ne=neighbors(cd),ls=0,lc=0;for(var j=0;j<ne.length;j++){var nl=asgn[ne[j]];if(!nl||!vecs[nl])continue;ls+=l2(vc,vecs[nl]);lc++;}if(lc>0){t+=ls/lc;c++;}}return c>0?t/c:0;}
function shuffleCode(codons,orig){var lb=[];for(var i=0;i<codons.length;i++)lb.push(orig[codons[i]]);for(var i=lb.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),tmp=lb[i];lb[i]=lb[j];lb[j]=tmp;}var n={};for(var i=0;i<codons.length;i++)n[codons[i]]=lb[i];return n;}

// ═══════════════════════════════════════════════
// TAB SYSTEM
// ═══════════════════════════════════════════════
function makeTab(name,codons,sgcAsgn,vecs,colorMap,gridType,desc){
  var sgcD=computeD(codons,sgcAsgn,vecs);
  return{name:name,codons:codons,sgcAsgn:sgcAsgn,vecs:vecs,colorMap:colorMap,gridType:gridType,desc:desc,sgcD:sgcD,
    stage:0,currentAsgn:null,currentD:null,
    simCount:0,simCountLe:0,wN:0,wMean:0,wM2:0,
    histBins:60,bins:null,histLo:0,histHi:1,histReady:false,
    slowTimer:0,slowPhaseCount:0,rampBatch:10,balls:[],simDone:false};
}

var tabs=[
  makeTab("Triplet \u00d7 20 AA",SC,(function(){var a={};for(var k in CT)a[k]=CT[k];return a;})(),PCA,ACOL,"triplet16",
    "61 sense codons, 20 amino acids.\nThe full standard genetic code.\nDeep optimization expected."),
  makeTab("Doublet \u00d7 10 AA",DC,(function(){var a={};for(var k in DT)a[k]=DT[k];return a;})(),CC,CCOL,"doublet4",
    "16 doublets, 10 reduced classes.\nOnly 2 positions \u2014 not enough room\nfor deep error minimization."),
  makeTab("Triplet \u00d7 10 AA",SC,(function(){var a={};for(var k in CT)a[k]=RAA10[CT[k]];return a;})(),CC,CCOL,"triplet16",
    "61 sense codons, 10 reduced classes.\nTriplet architecture with smaller alphabet.\nArchitecture enables optimization.")
];
for(var ti=0;ti<tabs.length;ti++) tabs[ti].bins=new Array(tabs[ti].histBins).fill(0);

var activeTab=0;
function T(){return tabs[activeTab];}

// ═══════════════════════════════════════════════
// SKETCH
// ═══════════════════════════════════════════════
var W=960,H=620;
var BG=[12,12,20],PBG=[20,22,32],TP=[230,235,245],TD=[140,145,160];
var AC=[100,180,255],GC=[255,200,60],TR=[255,90,90];
var TOTAL=1000000,SLOW_MAX=30;
var t=0;

function setup(){createCanvas(W,H).parent("sketch-container");textFont("monospace");}

function welfordPush(tab,v){tab.wN++;var d=v-tab.wMean;tab.wMean+=d/tab.wN;var d2=v-tab.wMean;tab.wM2+=d*d2;}
function welfordStd(tab){return tab.wN>1?Math.sqrt(tab.wM2/(tab.wN-1)):0;}

function calibrate(tab){
  var samples=[];
  for(var i=0;i<300;i++){var sh=shuffleCode(tab.codons,tab.sgcAsgn);samples.push(computeD(tab.codons,sh,tab.vecs));}
  var m=0;for(var i=0;i<samples.length;i++)m+=samples[i];m/=samples.length;
  var v=0;for(var i=0;i<samples.length;i++)v+=(samples[i]-m)*(samples[i]-m);var s=Math.sqrt(v/(samples.length-1));
  tab.histLo=Math.min(tab.sgcD-s,m-4*s);tab.histHi=m+4*s;tab.histReady=true;
  for(var i=0;i<samples.length;i++){
    welfordPush(tab,samples[i]);
    var idx=Math.floor((samples[i]-tab.histLo)/(tab.histHi-tab.histLo)*tab.histBins);
    if(idx>=0&&idx<tab.histBins)tab.bins[idx]++;
    if(samples[i]<=tab.sgcD)tab.simCountLe++;
    tab.simCount++;
  }
}

function draw(){
  t=millis()*0.001;
  background(BG[0],BG[1],BG[2]);
  var tab=T();
  drawTabBar();
  if(tab.stage<=2) drawFullView(tab);
  else{drawSimLeft(tab);drawHistogram(tab);}
  drawBottom(tab);
  if(tab.stage===3) runSlow(tab);
  if(tab.stage===4) runFast(tab);
}

// ═══════════════════════════════════════════════
// TAB BAR
// ═══════════════════════════════════════════════
function drawTabBar(){
  var tw=280,th=32,sx=(W-3*tw-20)/2,sy=6;
  for(var i=0;i<3;i++){
    var x=sx+i*(tw+10),act=i===activeTab;
    fill(act?[50,60,90]:[28,30,42]);noStroke();rect(x,sy,tw,th,6);
    fill(act?TP:TD);textSize(13);textAlign(CENTER,CENTER);
    text((i+1)+". "+tabs[i].name,x+tw/2,sy+th/2);
  }
}

// ═══════════════════════════════════════════════
// CODON GRID (triplet 4×16 or doublet 4×4)
// ═══════════════════════════════════════════════
function drawGrid(gx,gy,cw,ch,asgn,colorMap,showLab,gridType){
  var rows=(gridType==="doublet4")?4:16;
  for(var r=0;r<rows;r++){
    var b1=Math.floor(r/(gridType==="doublet4"?1:4)),b3=r%(gridType==="doublet4"?4:4);
    if(gridType==="doublet4"){b1=r;b3=-1;}
    var ry=gy+r*ch;
    for(var c=0;c<4;c++){
      var codon;
      if(gridType==="doublet4") codon=GB[b1]+GB[c];
      else codon=GB[Math.floor(r/4)]+GB[c]+GB[r%4];
      var aa=asgn[codon];
      var cx2=gx+c*cw;
      if(!aa){
        fill(30,30,40);noStroke();rect(cx2,ry,cw-1,ch-1,2);
        fill(60,60,70);textSize(Math.max(7,ch*0.35));textAlign(CENTER,CENTER);
        text("X",cx2+cw/2,ry+ch/2);
      } else {
        var col=colorMap[aa]||[100,100,100];
        var br=Math.sin(t*1.5+r*0.2+c*0.5)*6;
        fill(col[0]+br,col[1]+br,col[2]+br);stroke(col[0]-30,col[1]-30,col[2]-30);strokeWeight(0.5);
        rect(cx2,ry,cw-1,ch-1,2);
        if(showLab){
          noStroke();var lum=(col[0]+col[1]+col[2])/3;
          fill(lum>120?0:255);textSize(Math.min(cw*0.38,ch*0.55));textAlign(CENTER,CENTER);
          text(aa,cx2+cw/2,ry+ch/2);
        }
      }
    }
    // group separator
    if(gridType!=="doublet4"&&r%4===3&&Math.floor(r/4)<3){
      stroke(50,55,70);strokeWeight(1);line(gx,ry+ch,gx+4*cw,ry+ch);
    }
  }
  noStroke();
  // axis labels
  fill(TD[0],TD[1],TD[2]);textSize(10);textAlign(CENTER,BOTTOM);
  for(var c=0;c<4;c++) text(GB[c],gx+c*cw+cw/2,gy-2);
  var nGroups=(gridType==="doublet4")?4:4;
  textSize(10);textAlign(RIGHT,CENTER);
  for(var g=0;g<nGroups;g++){
    var mid=gridType==="doublet4"?gy+g*ch+ch/2:gy+g*4*ch+2*ch;
    text(GB[g],gx-6,mid);
  }
  if(gridType!=="doublet4"){
    textSize(8);textAlign(LEFT,CENTER);
    for(var r=0;r<16;r++) text(GB[r%4],gx+4*cw+3,gy+r*ch+ch/2);
  }
}

// ═══════════════════════════════════════════════
// FULL VIEW (stages 0-2)
// ═══════════════════════════════════════════════
function drawFullView(tab){
  // title
  fill(AC[0],AC[1],AC[2]);textSize(18);textAlign(LEFT,TOP);
  text("Genetic Code Optimality",15,46);
  fill(TD[0],TD[1],TD[2]);textSize(11);
  text(tab.name,15,68);

  if(tab.stage>=1){
    var isDbl=tab.gridType==="doublet4";
    var cw=isDbl?52:44,ch=isDbl?52:28;
    var gridH=isDbl?4*ch:16*ch;

    // SGC grid
    var g1x=30,g1y=105;
    fill(GC[0],GC[1],GC[2]);textSize(14);textAlign(CENTER,BOTTOM);
    text("Standard Code",g1x+2*cw,g1y-18);
    textSize(20);text("D = "+tab.sgcD.toFixed(2),g1x+2*cw,g1y-1);
    drawGrid(g1x,g1y,cw,ch,tab.sgcAsgn,tab.colorMap,true,tab.gridType);

    if(tab.stage>=2&&tab.currentAsgn){
      // shuffled grid
      var g2x=isDbl?300:250,g2y=g1y;
      fill(TR[0],TR[1],TR[2]);textSize(14);textAlign(CENTER,BOTTOM);
      text("Random Shuffle",g2x+2*cw,g2y-18);
      textSize(20);text("D = "+(tab.currentD||0).toFixed(2),g2x+2*cw,g2y-1);
      drawGrid(g2x,g2y,cw,ch,tab.currentAsgn,tab.colorMap,true,tab.gridType);

      // info panel
      var ix=isDbl?560:480,iy=g1y-5,iw=W-ix-15;
      fill(PBG[0],PBG[1],PBG[2],210);noStroke();rect(ix,iy,iw,gridH+25,8);
      var ty=iy+12;
      fill(TP[0],TP[1],TP[2]);textSize(15);textAlign(LEFT,TOP);
      text("What changed?",ix+12,ty);ty+=28;
      fill(TD[0],TD[1],TD[2]);textSize(11);
      text("Same degeneracy, shuffled labels.",ix+12,ty);ty+=20;
      fill(GC[0],GC[1],GC[2]);textSize(13);
      text("SGC: D = "+tab.sgcD.toFixed(2),ix+12,ty);ty+=16;
      fill(TD[0],TD[1],TD[2]);textSize(10);
      text("Color blocks = similar neighbors",ix+12,ty);ty+=20;
      fill(TR[0],TR[1],TR[2]);textSize(13);
      text("Random: D = "+(tab.currentD||0).toFixed(2),ix+12,ty);ty+=16;
      fill(TD[0],TD[1],TD[2]);textSize(10);
      text("Scattered = dissimilar neighbors",ix+12,ty);ty+=24;
      var diff=((tab.currentD||0)-tab.sgcD);
      fill(TR[0],TR[1],TR[2]);textSize(16);
      text("\u0394D = +"+diff.toFixed(2)+" (+"+(100*diff/tab.sgcD).toFixed(0)+"%)",ix+12,ty);ty+=30;
      fill(AC[0],AC[1],AC[2]);textSize(13);
      text("Click to test 1,000,000 more",ix+12,ty);

      // description
      ty+=35;fill(TD[0],TD[1],TD[2]);textSize(10);
      var dl=tab.desc.split("\n");
      for(var di=0;di<dl.length;di++){text(dl[di],ix+12,ty);ty+=14;}
    } else {
      // stage 1 explanation
      var ix=isDbl?300:250,iy=g1y-5,iw=W-ix-15;
      fill(PBG[0],PBG[1],PBG[2],210);noStroke();rect(ix,iy,iw,gridH+25,8);
      var ty=iy+15;
      fill(TP[0],TP[1],TP[2]);textSize(16);textAlign(LEFT,TOP);
      text("The Standard Genetic Code",ix+15,ty);ty+=30;
      fill(TD[0],TD[1],TD[2]);textSize(12);
      text("Each cell = one codon. Color = amino acid.",ix+15,ty);ty+=20;
      text("Same color = same amino acid.",ix+15,ty);ty+=28;
      text("Notice the COLOR BLOCKS \u2014",ix+15,ty);ty+=18;
      text("neighbors code for similar amino acids.",ix+15,ty);ty+=28;
      fill(GC[0],GC[1],GC[2]);textSize(14);
      text("This is error minimization.",ix+15,ty);ty+=22;
      fill(TD[0],TD[1],TD[2]);textSize(11);
      text("Translation errors hit similar AAs",ix+15,ty);ty+=16;
      text("\u2192 minimal damage to the protein.",ix+15,ty);ty+=30;
      fill(GC[0],GC[1],GC[2]);textSize(28);
      text("D = "+tab.sgcD.toFixed(2),ix+15,ty);ty+=36;
      fill(TD[0],TD[1],TD[2]);textSize(11);
      text("(lower = better error protection)",ix+15,ty);ty+=30;
      fill(AC[0],AC[1],AC[2]);textSize(14);
      text("Is this just luck? Click to shuffle...",ix+15,ty);ty+=28;
      // description
      fill(TD[0],TD[1],TD[2]);textSize(10);
      var dl=tab.desc.split("\n");
      for(var di=0;di<dl.length;di++){text(dl[di],ix+15,ty);ty+=14;}
    }
  }

  // intro overlay
  if(tab.stage===0){
    fill(12,12,20,220);rect(40,45,W-80,H-110,12);
    fill(TP[0],TP[1],TP[2]);textSize(26);textAlign(CENTER,TOP);
    text("How Optimized Is the Genetic Code?",W/2,80);
    fill(TD[0],TD[1],TD[2]);textSize(14);
    var intro=["","64 codons map to 20 amino acids.","Is this mapping random, or carefully optimized","to minimize damage from translation errors?","",
      "We'll show you the answer with 1,000,000 shuffles.",""];
    var iy=130;
    for(var i=0;i<intro.length;i++){text(intro[i],W/2,iy);iy+=24;}
    var pulse=Math.sin(t*3)*5;
    fill(AC[0],AC[1],AC[2]);textSize(18);
    text("Click anywhere to begin",W/2,iy+15+pulse);
  }
}

// ═══════════════════════════════════════════════
// SIMULATION VIEW (stages 3-5)
// ═══════════════════════════════════════════════
function drawSimLeft(tab){
  var pw=260,ph=500,px=8,py=52;
  fill(PBG[0],PBG[1],PBG[2]);stroke(40,45,60);strokeWeight(1);
  rect(px,py,pw,ph,8);noStroke();

  fill(AC[0],AC[1],AC[2]);textSize(12);textAlign(LEFT,TOP);
  text("Genetic Code Optimality \u2014 "+tab.name,10,42);

  var isDbl=tab.gridType==="doublet4";
  var cw=isDbl?28:24,ch=isDbl?28:13;

  // SGC mini
  fill(GC[0],GC[1],GC[2]);textSize(10);textAlign(CENTER,BOTTOM);
  text("SGC  D="+tab.sgcD.toFixed(2),px+pw/2,py+14);
  drawGrid(px+35,py+17,cw,ch,tab.sgcAsgn,tab.colorMap,false,tab.gridType);

  // random mini
  var asgn=tab.currentAsgn||tab.sgcAsgn;
  var dVal=tab.currentD||tab.sgcD;
  var gy2=isDbl?py+145:py+240;
  fill(TR[0],TR[1],TR[2]);textSize(10);textAlign(CENTER,BOTTOM);
  text("Random  D="+dVal.toFixed(2),px+pw/2,gy2);
  drawGrid(px+35,gy2+3,cw,ch,asgn,tab.colorMap,false,tab.gridType);

  fill(TD[0],TD[1],TD[2]);textSize(10);textAlign(CENTER,BOTTOM);
  text(tab.simCount.toLocaleString()+" shuffles",px+pw/2,py+ph-6);
}

function drawHistogram(tab){
  var px=278,py=52,pw=W-px-8,ph=500;
  fill(PBG[0],PBG[1],PBG[2]);stroke(40,45,60);strokeWeight(1);
  rect(px,py,pw,ph,8);noStroke();

  fill(TD[0],TD[1],TD[2]);textSize(11);textAlign(CENTER,TOP);
  text("WHERE DO RANDOM CODES LAND?",px+pw/2,py+8);

  var hx=px+50,hy=py+35,hw=pw-80,hh=ph-120;
  var nb=tab.histBins,barW=hw/nb;
  var maxBin=1;for(var i=0;i<nb;i++)if(tab.bins[i]>maxBin)maxBin=tab.bins[i];

  // stacked dots
  var maxD=55;
  for(var i=0;i<nb;i++){
    if(tab.bins[i]===0)continue;
    var bx=hx+i*barW+barW/2;
    var dn=Math.min(Math.ceil((tab.bins[i]/maxBin)*maxD),maxD);
    var bH=(tab.bins[i]/maxBin)*hh;
    var ds=Math.min(bH/dn,5);
    var frac=i/nb;
    var cr=Math.round(60+frac*50),cg=Math.round(130+frac*50),cb=Math.round(210-frac*90);
    for(var d=0;d<dn;d++){
      var dy=hy+hh-d*ds-2;if(dy<hy)break;
      var wob=Math.sin(t*1.2+i*0.3+d*0.5)*0.4;
      fill(cr,cg,cb,190);noStroke();circle(bx+wob,dy,4);
    }
  }

  // falling balls
  for(var bi=tab.balls.length-1;bi>=0;bi--){
    var b=tab.balls[bi];b.vy+=0.6;b.y+=b.vy;
    if(b.y>=hh){tab.balls.splice(bi,1);continue;}
    var bx=hx+b.frac*hw,by=hy+b.y;
    if(by>hy&&by<hy+hh){
      fill(255,255,255,240);noStroke();circle(bx,by,6);
      if(b.y<hh*0.4){fill(255,255,255,150);textSize(9);textAlign(CENTER,BOTTOM);text(b.d.toFixed(1),bx,by-7);}
      fill(255,255,255,40);circle(bx,by-6,3);
    }
  }

  // SGC line
  var sgcFrac=(tab.sgcD-tab.histLo)/(tab.histHi-tab.histLo);
  var sgcX=hx+sgcFrac*hw;
  if(sgcX>=hx&&sgcX<=hx+hw){
    var pulse=Math.sin(t*3)*0.3+0.7;
    stroke(GC[0],GC[1],GC[2],30*pulse);strokeWeight(14);line(sgcX,hy,sgcX,hy+hh);
    stroke(GC[0],GC[1],GC[2],220);strokeWeight(3);line(sgcX,hy,sgcX,hy+hh);
    noStroke();fill(GC[0],GC[1],GC[2]);
    textSize(13);textAlign(CENTER,BOTTOM);text("\u2190 SGC (D="+tab.sgcD.toFixed(2)+")",sgcX,hy-6);
  }

  // x-axis
  noStroke();fill(TD[0],TD[1],TD[2]);textSize(9);textAlign(CENTER,TOP);
  for(var i=0;i<=4;i++){var val=tab.histLo+(tab.histHi-tab.histLo)*(i/4);text(val.toFixed(1),hx+(i/4)*hw,hy+hh+5);}
  textSize(10);text("Noise Distortion D (lower = better)",hx+hw/2,hy+hh+22);

  // stats overlay
  var sx=px+pw-190,sy=hy+hh-150;
  fill(PBG[0],PBG[1],PBG[2],230);noStroke();rect(sx,sy,180,145,6);
  stroke(50,55,70);strokeWeight(1);noFill();rect(sx,sy,180,145,6);noStroke();
  var sty=sy+8;
  fill(TD[0],TD[1],TD[2]);textSize(9);textAlign(CENTER,TOP);text("LIVE STATISTICS",sx+90,sty);sty+=18;
  function sR(l,v,c){fill(TD[0],TD[1],TD[2]);textSize(11);textAlign(LEFT,TOP);text(l,sx+10,sty);fill(c[0],c[1],c[2]);textAlign(RIGHT,TOP);text(v,sx+170,sty);sty+=17;}
  sR("SGC Score",tab.sgcD.toFixed(2),GC);
  sR("Null Mean",tab.wMean.toFixed(2),TP);
  var z=welfordStd(tab)>0?(tab.sgcD-tab.wMean)/welfordStd(tab):0;
  sR("z-score",z.toFixed(2),Math.abs(z)>5?[255,80,80]:[255,180,60]);
  sty+=6;
  fill(tab.simCountLe===0?[100,255,100]:[255,200,60]);
  textSize(18);textAlign(CENTER,TOP);
  text(tab.simCountLe+" / "+tab.simCount.toLocaleString(),sx+90,sty);sty+=22;
  fill(TD[0],TD[1],TD[2]);textSize(8);text("codes that beat the SGC",sx+90,sty);

  // big counter
  fill(TP[0],TP[1],TP[2]);textSize(14);textAlign(CENTER,BOTTOM);
  text(tab.simCount.toLocaleString()+" / 1,000,000",px+pw/2,py+ph-10);

  if(tab.simDone&&tab.simCountLe===0){
    var flash=Math.sin(t*2)*0.3+0.7;
    fill(100,255,100,220*flash);textSize(15);textAlign(CENTER,CENTER);
    text("1,000,000 random codes \u2014 NONE beat the SGC!",px+pw/2,py+ph-35);
  }
  if(tab.simDone&&tab.simCountLe>0){
    fill(255,200,60,200);textSize(14);textAlign(CENTER,CENTER);
    text(tab.simCountLe+" of 1M codes matched or beat SGC (z="+z.toFixed(1)+")",px+pw/2,py+ph-35);
  }
}

// ═══════════════════════════════════════════════
// SIMULATION
// ═══════════════════════════════════════════════
function runSlow(tab){
  tab.slowTimer++;
  var interval=Math.max(3,Math.round(30-tab.slowPhaseCount*0.9));
  if(tab.slowTimer>=interval){
    tab.slowTimer=0;
    var sh=shuffleCode(tab.codons,tab.sgcAsgn);
    var d=computeD(tab.codons,sh,tab.vecs);
    welfordPush(tab,d);
    var idx=Math.floor((d-tab.histLo)/(tab.histHi-tab.histLo)*tab.histBins);
    if(idx>=0&&idx<tab.histBins)tab.bins[idx]++;
    if(d<=tab.sgcD)tab.simCountLe++;
    tab.simCount++;tab.currentAsgn=sh;tab.currentD=d;tab.slowPhaseCount++;
    var frac=(d-tab.histLo)/(tab.histHi-tab.histLo);
    if(frac>=0&&frac<=1)tab.balls.push({frac:frac,y:0,vy:0,d:d});
    if(tab.slowPhaseCount>=SLOW_MAX){tab.stage=4;tab.rampBatch=50;}
  }
}

function runFast(tab){
  if(tab.rampBatch<3000)tab.rampBatch=Math.min(3000,Math.round(tab.rampBatch*1.05));
  var end=Math.min(tab.simCount+tab.rampBatch,TOTAL);
  var spawnEvery=Math.max(1,Math.floor(tab.rampBatch/4));var lc=0;
  while(tab.simCount<end){
    var sh=shuffleCode(tab.codons,tab.sgcAsgn);
    var d=computeD(tab.codons,sh,tab.vecs);
    welfordPush(tab,d);
    var idx=Math.floor((d-tab.histLo)/(tab.histHi-tab.histLo)*tab.histBins);
    if(idx>=0&&idx<tab.histBins)tab.bins[idx]++;
    if(d<=tab.sgcD)tab.simCountLe++;
    tab.simCount++;tab.currentAsgn=sh;tab.currentD=d;lc++;
    if(lc%spawnEvery===0&&tab.balls.length<10){
      var frac=(d-tab.histLo)/(tab.histHi-tab.histLo);
      if(frac>=0&&frac<=1)tab.balls.push({frac:frac,y:0,vy:0,d:d});
    }
  }
  if(tab.simCount>=TOTAL){tab.simDone=true;tab.stage=5;}
}

// ═══════════════════════════════════════════════
// BOTTOM BAR + INPUT
// ═══════════════════════════════════════════════
function drawBottom(tab){
  noStroke();fill(TD[0],TD[1],TD[2]);textSize(11);textAlign(CENTER,BOTTOM);
  var labels=["Click anywhere to begin","The real code \u2014 click to shuffle",
    "One shuffle \u2014 click for 1,000,000","Slow simulation... watching each shuffle",
    "Accelerating... "+tab.simCount.toLocaleString(),"Done \u2014 "+tab.name];
  text(labels[Math.min(tab.stage,5)],W/2,H-10);
  textSize(9);fill(80,85,100);
  text("click/\u2192 advance | 1 2 3 switch tabs",W/2,H-0);
}

function advance(){
  var tab=T();
  if(tab.stage===0)tab.stage=1;
  else if(tab.stage===1){tab.currentAsgn=shuffleCode(tab.codons,tab.sgcAsgn);tab.currentD=computeD(tab.codons,tab.currentAsgn,tab.vecs);tab.stage=2;}
  else if(tab.stage===2){if(!tab.histReady)calibrate(tab);tab.stage=3;tab.slowTimer=0;tab.slowPhaseCount=0;}
}

function switchTab(i){if(i>=0&&i<3)activeTab=i;}

function mousePressed(){
  // tab clicks
  var tw=280,th=32,sx=(W-3*tw-20)/2,sy=6;
  for(var i=0;i<3;i++){var x=sx+i*(tw+10);if(mouseX>=x&&mouseX<=x+tw&&mouseY>=sy&&mouseY<=sy+th){switchTab(i);return;}}
  advance();
}
window.addEventListener("keydown",function(e){
  if(e.key==="ArrowRight"){e.preventDefault();advance();}
  else if(e.key==="ArrowLeft"){e.preventDefault();var tab=T();if(tab.stage>0&&tab.stage<=2){tab.stage--;tab.currentAsgn=null;tab.currentD=null;}}
  else if(e.key===" "){e.preventDefault();advance();}
  else if(e.key==="1")switchTab(0);
  else if(e.key==="2")switchTab(1);
  else if(e.key==="3")switchTab(2);
});
  </script>
