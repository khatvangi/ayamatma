    .subtitle { font-size: 13px; font-weight: 500; fill: #7A5E7E; }
    .label { font-size: 13px; font-weight: 700; fill: #2A163A; }
    .small { font-size: 11px; font-weight: 500; fill: #7A5E7E; }
    .tiny { font-size: 10px; font-weight: 600; fill: #7A5E7E; }
    .num { font-size: 13px; font-weight: 800; fill: #2A163A; }
  </style>
