<g filter="url(#softShadow)"><rect x="280" y="113" width="170" height="44" rx="18" fill="url(#goldGrad)" opacity="0.92"/><text class="label" x="365.0" y="134" text-anchor="middle">rāmeti</text><text class="small" x="365.0" y="148" text-anchor="middle">invocation · 6</text></g>
<g filter="url(#softShadow)"><rect x="468" y="118" width="126" height="44" rx="18" fill="url(#goldGrad)" opacity="0.92"/><text class="label" x="531.0" y="139" text-anchor="middle">rāme</text><text class="small" x="531.0" y="153" text-anchor="middle">intensification · 4</text></g>
<g filter="url(#softShadow)"><rect x="612" y="118" width="126" height="44" rx="18" fill="url(#goldGrad)" opacity="0.92"/><text class="label" x="675.0" y="139" text-anchor="middle">rāme</text><text class="small" x="675.0" y="153" text-anchor="middle">intensification · 4</text></g>
<g filter="url(#softShadow)"><rect x="756" y="110" width="214" height="52" rx="18" fill="url(#violetGrad)" opacity="0.92"/><text class="label" x="863.0" y="131" text-anchor="middle">manorame</text><text class="small" x="863.0" y="153" text-anchor="middle">absorption · 8</text></g>
<path d="M90 225 C250 245, 420 245, 520 225" fill="none" stroke="url(#goldGrad)" stroke-width="5" opacity="0.7"/>
<path d="M540 225 C640 205, 760 205, 840 225" fill="none" stroke="url(#violetGrad)" stroke-width="5" opacity="0.7"/>
